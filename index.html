
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استشارات وقضايا</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border-top: 5px solid #0056b3;
        }
        h1 {
            color: #0056b3;
            font-size: 26px;
            margin-bottom: 15px;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
            margin-bottom: 30px;
        }
        .btn-call {
            display: inline-block;
            background-color: #28a745;
            color: white;
            padding: 14px 35px;
            font-size: 18px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }
        .btn-call:hover {
            background-color: #218838;
            transform: translateY(-2px);
        }
    </style>

    <!-- كود فحص الجهاز والتحويل التلقائي للاتصال المباشر إذا كان الزائر يستعمل الجوال -->
    <script type="text/javascript">
    (function() {
        var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobile) {
            window.location.href = "tel:+966556799995";
        }
    })();
    </script>
</head>
<body>

    <div class="card">
        <h1>مرحباً بك في منصة الاستشارات القانونية</h1>
        <p>نحن هنا لخدمتك والإجابة على كافة الاستفسارات المتعلقة بالقضايا والاستشارات بسرعة واحترافية.</p>
        <a href="tel:+966556799995" class="btn-call">اتصل بنا الآن</a>
    </div>

</body>
</html>
